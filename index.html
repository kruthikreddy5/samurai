<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRUTHIK | Builder</title>
    <style>
        :root {
            --bg-color: #0B120B; /* Deep Forest Shadow */
            --tag-bg: #1A261A;   /* Muted Pine */
            --accent: #4ADE80;   /* Neon Forest */
            --text-main: #E0E0E0;
            --text-muted: #A3B1A3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace; /* Monospaced vibe */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* The Signature Header */
        h1 {
            font-size: 4rem;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .wavy {
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: var(--accent);
        }

        /* The Deconstructed Identity Tag */
        .identity-tag {
            background-color: var(--tag-bg);
            padding: 2rem;
            width: 280px;
            border-radius: 4px;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.3);
            position: relative;
            transform: rotate(-2deg); /* Organic, deconstructed feel */
            margin-top: 2rem;
        }

        .tag-header {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--text-muted);
            padding-bottom: 5px;
        }

        .tag-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .tag-details {
            font-size: 0.75rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .barcode {
            margin-top: 1.5rem;
            height: 40px;
            background: repeating-linear-gradient(
                90deg,
                var(--text-main),
                var(--text-main) 2px,
                transparent 2px,
                transparent 4px
            );
            width: 100%;
        }

        /* Background Grid */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(var(--tag-bg) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>

    <header>
        <h1 class="wavy">KRUTHIK</h1>
    </header>

    <div class="identity-tag">
        <div class="tag-header">BUILDER // PATTERN-SEEKER</div>
        <div class="tag-name">ID: KRUTHIK</div>
        <div class="tag-details">
            LOC: HYDERABAD, IN <br>
            STATUS: GRADE 11 / MPC <br>
            MINDSET: CREATOR
        </div>
        <div class="barcode"></div>
    </div>
</body>
</html>
